<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 290" font-family="system-ui,sans-serif">
  <defs>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#c65d2e"/>
    </marker>
    <marker id="at" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#39675e"/>
    </marker>
  </defs>
  <rect width="900" height="290" rx="18" fill="#fffaf2" stroke="rgba(71,45,31,0.12)" stroke-width="1.5"/>

  <!-- LEFT PANEL: 일반 벡터 -->
  <rect x="22" y="22" width="406" height="246" rx="12" fill="#f7f1e8" stroke="rgba(71,45,31,0.1)" stroke-width="1"/>
  <text x="225" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#1f1a17">일반 벡터</text>
  <line x1="225" y1="62" x2="225" y2="248" stroke="rgba(71,45,31,0.2)" stroke-width="1"/>
  <line x1="40" y1="155" x2="410" y2="155" stroke="rgba(71,45,31,0.2)" stroke-width="1"/>
  <!-- x vector: upper-left -->
  <line x1="225" y1="155" x2="172" y2="98" stroke="#39675e" stroke-width="2.5" marker-end="url(#at)"/>
  <text x="155" y="94" font-size="15" font-weight="700" fill="#39675e">x</text>
  <!-- Ax vector: upper-right (different direction) -->
  <line x1="225" y1="155" x2="308" y2="87" stroke="#c65d2e" stroke-width="2.5" marker-end="url(#ao)"/>
  <text x="314" y="83" font-size="15" font-weight="700" fill="#c65d2e">Ax</text>
  <text x="225" y="263" text-anchor="middle" font-size="12" fill="#675e57">변환 후 방향이 꺾임 — 고유벡터가 아님</text>

  <!-- RIGHT PANEL: 고유벡터 -->
  <rect x="472" y="22" width="406" height="246" rx="12" fill="#f7f1e8" stroke="rgba(71,45,31,0.1)" stroke-width="1"/>
  <text x="675" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#1f1a17">고유벡터</text>
  <!-- span line (dashed): direction (0.8,-0.6), ±145 from (675,155) -->
  <line x1="559" y1="242" x2="791" y2="68" stroke="rgba(198,93,46,0.28)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="675" y1="62" x2="675" y2="248" stroke="rgba(71,45,31,0.2)" stroke-width="1"/>
  <line x1="490" y1="155" x2="860" y2="155" stroke="rgba(71,45,31,0.2)" stroke-width="1"/>
  <!-- x vector: dir (0.8,-0.6), len=68 → (729,114) -->
  <line x1="675" y1="155" x2="727" y2="114" stroke="#39675e" stroke-width="2.5" marker-end="url(#at)"/>
  <text x="733" y="110" font-size="15" font-weight="700" fill="#39675e">x</text>
  <!-- Ax=λx: same dir, len=122 → (772,82) -->
  <line x1="675" y1="155" x2="773" y2="82" stroke="#c65d2e" stroke-width="2.5" marker-end="url(#ao)"/>
  <text x="778" y="78" font-size="15" font-weight="700" fill="#c65d2e">Ax = λx</text>
  <text x="718" y="148" font-size="11" fill="#675e57" font-style="italic">λ배</text>
  <text x="560" y="237" font-size="11" fill="rgba(198,93,46,0.65)" font-style="italic">같은 직선 (span)</text>
  <text x="675" y="263" text-anchor="middle" font-size="12" fill="#675e57">변환 후 같은 직선(span) 위에 남음 — 고유벡터</text>
</svg>
