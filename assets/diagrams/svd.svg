<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 290" font-family="system-ui,sans-serif">
  <defs>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#c65d2e"/>
    </marker>
    <marker id="at" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#39675e"/>
    </marker>
    <marker id="ag" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="rgba(71,45,31,0.35)"/>
    </marker>
  </defs>
  <rect width="900" height="290" rx="18" fill="#fffaf2" stroke="rgba(71,45,31,0.12)" stroke-width="1.5"/>

  <!-- LEFT PANEL: 입력 공간 -->
  <rect x="22" y="22" width="388" height="246" rx="12" fill="#f7f1e8" stroke="rgba(71,45,31,0.1)" stroke-width="1"/>
  <text x="216" y="48" text-anchor="middle" font-size="13" font-weight="700" fill="#1f1a17">입력 공간 R^n</text>
  <text x="216" y="63" text-anchor="middle" font-size="11" fill="#675e57">단위 원 (unit circle)</text>

  <!-- Unit circle -->
  <circle cx="216" cy="155" r="78" fill="rgba(57,103,94,0.08)" stroke="#39675e" stroke-width="1.8"/>

  <!-- Axis dashes through circle (v1, v2 directions) -->
  <line x1="138" y1="155" x2="294" y2="155" stroke="rgba(71,45,31,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="216" y1="77" x2="216" y2="233" stroke="rgba(71,45,31,0.2)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- v1 arrow (orange, along +x, length=78 to edge) -->
  <line x1="216" y1="155" x2="291" y2="155" stroke="#c65d2e" stroke-width="2.5" marker-end="url(#ao)"/>
  <text x="296" y="151" font-size="13" font-weight="700" fill="#c65d2e">v₁</text>
  <text x="280" y="173" font-size="10" fill="#c65d2e">σ₁ 방향</text>

  <!-- v2 arrow (teal, along -y = up, length=78 to top) -->
  <line x1="216" y1="155" x2="216" y2="80" stroke="#39675e" stroke-width="2.5" marker-end="url(#at)"/>
  <text x="222" y="76" font-size="13" font-weight="700" fill="#39675e">v₂</text>
  <text x="224" y="100" font-size="10" fill="#39675e">σ₂ 방향</text>

  <!-- caption -->
  <text x="216" y="263" text-anchor="middle" font-size="11" fill="#675e57">V^T 가 이 입력 방향들을 정렬</text>

  <!-- MIDDLE: formula + arrow -->
  <text x="450" y="142" text-anchor="middle" font-size="17" font-weight="700" fill="#1f1a17">A = UΣVᵀ</text>
  <text x="450" y="160" text-anchor="middle" font-size="11" fill="#675e57">회전 × 스케일 × 회전</text>
  <line x1="420" y1="172" x2="480" y2="172" stroke="#c65d2e" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- RIGHT PANEL: 출력 공간 -->
  <rect x="490" y="22" width="388" height="246" rx="12" fill="#f7f1e8" stroke="rgba(71,45,31,0.1)" stroke-width="1"/>
  <text x="684" y="48" text-anchor="middle" font-size="13" font-weight="700" fill="#1f1a17">출력 공간 R^m</text>
  <text x="684" y="63" text-anchor="middle" font-size="11" fill="#675e57">A(단위원) = 타원 (ellipse)</text>

  <!-- Ellipse: rx=108 (σ₁), ry=44 (σ₂) -->
  <ellipse cx="684" cy="155" rx="108" ry="44" fill="rgba(198,93,46,0.08)" stroke="#c65d2e" stroke-width="1.8"/>

  <!-- Axis dashes through ellipse -->
  <line x1="576" y1="155" x2="792" y2="155" stroke="rgba(71,45,31,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="684" y1="111" x2="684" y2="199" stroke="rgba(71,45,31,0.2)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- σ₁·u₁ arrow (orange, along +x, to ellipse right edge) -->
  <line x1="684" y1="155" x2="789" y2="155" stroke="#c65d2e" stroke-width="2.5" marker-end="url(#ao)"/>
  <text x="794" y="151" font-size="13" font-weight="700" fill="#c65d2e">u₁</text>
  <text x="745" y="172" font-size="10" fill="#c65d2e">σ₁ (큰 특이값)</text>

  <!-- σ₂·u₂ arrow (teal, along -y = up, to ellipse top edge) -->
  <line x1="684" y1="155" x2="684" y2="114" stroke="#39675e" stroke-width="2.5" marker-end="url(#at)"/>
  <text x="690" y="110" font-size="13" font-weight="700" fill="#39675e">u₂</text>
  <text x="692" y="133" font-size="10" fill="#39675e">σ₂ (작은 특이값)</text>

  <!-- σ₁ size annotation -->
  <line x1="684" y1="214" x2="792" y2="214" stroke="rgba(71,45,31,0.35)" stroke-width="1" marker-end="url(#ag)"/>
  <line x1="684" y1="210" x2="684" y2="218" stroke="rgba(71,45,31,0.35)" stroke-width="1"/>
  <text x="738" y="226" text-anchor="middle" font-size="10" fill="#675e57">σ₁</text>

  <!-- caption -->
  <text x="684" y="263" text-anchor="middle" font-size="11" fill="#675e57">σᵢ = A^T A의 고유값의 제곱근 (특이값)</text>
</svg>
