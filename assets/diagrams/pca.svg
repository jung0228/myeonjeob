<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 290" font-family="system-ui,sans-serif">
  <defs>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#c65d2e"/>
    </marker>
    <marker id="at" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#39675e"/>
    </marker>
  </defs>
  <rect width="900" height="290" rx="18" fill="#fffaf2" stroke="rgba(71,45,31,0.12)" stroke-width="1.5"/>
  <rect x="22" y="22" width="856" height="246" rx="12" fill="#f7f1e8" stroke="rgba(71,45,31,0.1)" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#1f1a17">PCA: 데이터가 가장 많이 퍼진 방향을 찾는다</text>

  <!-- Data points (elliptically distributed, center≈(450,158), major axis at 30°) -->
  <!-- cos30=0.866, sin30=0.5; x=450+82.3u-16v, y=158+47.5u+27.7v -->
  <circle cx="366" cy="113" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="384" cy="101" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="373" cy="139" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="393" cy="114" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="386" cy="154" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="422" cy="112" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="409" cy="153" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="435" cy="127" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="418" cy="176" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="448" cy="142" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="437" cy="180" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="461" cy="139" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="453" cy="171" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="483" cy="140" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="465" cy="189" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="491" cy="163" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="477" cy="207" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="504" cy="178" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="496" cy="211" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="525" cy="171" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="513" cy="202" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="532" cy="187" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="528" cy="214" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="406" cy="130" r="3.5" fill="rgba(103,94,87,0.45)"/>
  <circle cx="468" cy="157" r="3.5" fill="rgba(103,94,87,0.45)"/>

  <!-- Projection lines (dashed, from 5 points to PC1 line) -->
  <!-- PC1 line: through (450,158), direction (0.866,0.5) -->
  <!-- Point (373,139): proj t=(373-450)*0.866+(139-158)*0.5=-66.7-9.5=-76.2 → (384,120) -->
  <line x1="373" y1="139" x2="384" y2="120" stroke="rgba(198,93,46,0.35)" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Point (437,180): proj t=(437-450)*0.866+(180-158)*0.5=-11.3+11=-0.3 → (450,158) -->
  <line x1="437" y1="180" x2="450" y2="158" stroke="rgba(198,93,46,0.35)" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Point (477,207): proj t=(477-450)*0.866+(207-158)*0.5=23.4+24.5=47.9 → (491,182) -->
  <line x1="477" y1="207" x2="491" y2="182" stroke="rgba(198,93,46,0.35)" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Point (496,211): proj t=(496-450)*0.866+(211-158)*0.5=39.8+26.5=66.3 → (507,191) -->
  <line x1="496" y1="211" x2="507" y2="191" stroke="rgba(198,93,46,0.35)" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Point (422,112): proj t=(422-450)*0.866+(112-158)*0.5=-24.2-23=-47.2 → (409,134) -->
  <line x1="422" y1="112" x2="409" y2="134" stroke="rgba(198,93,46,0.35)" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- PC1 arrow: from (450,158), direction (0.866,0.5), length=110 → (545,213) -->
  <!-- Also extend backward: (450-90,158-52)=(360,106) to show the axis -->
  <line x1="360" y1="106" x2="542" y2="213" stroke="rgba(198,93,46,0.2)" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="450" y1="158" x2="543" y2="213" stroke="#c65d2e" stroke-width="3" marker-end="url(#ao)"/>
  <text x="550" y="210" font-size="14" font-weight="700" fill="#c65d2e">PC1</text>
  <text x="554" y="226" font-size="11" fill="#c65d2e">분산 최대 방향</text>

  <!-- PC2 arrow: from (450,158), direction (0.5,-0.866), length=60 → (480,106) -->
  <line x1="450" y1="158" x2="479" y2="106" stroke="#39675e" stroke-width="3" marker-end="url(#at)"/>
  <text x="484" y="102" font-size="14" font-weight="700" fill="#39675e">PC2</text>
  <text x="487" y="118" font-size="11" fill="#39675e">분산 최소 방향</text>

  <!-- Centroid dot -->
  <circle cx="450" cy="158" r="4.5" fill="#1f1a17" opacity="0.6"/>
  <text x="455" y="174" font-size="10" fill="#675e57">중심</text>

  <!-- Right side annotations -->
  <rect x="638" y="80" width="210" height="115" rx="10" fill="rgba(255,250,242,0.9)" stroke="rgba(71,45,31,0.12)" stroke-width="1"/>
  <text x="743" y="102" text-anchor="middle" font-size="12" font-weight="700" fill="#1f1a17">핵심 아이디어</text>
  <text x="655" y="122" font-size="11" fill="#675e57">• PC1: 공분산 행렬의 1번째 고유벡터</text>
  <text x="655" y="140" font-size="11" fill="#675e57">• 고유값 = 그 방향의 분산량</text>
  <text x="655" y="158" font-size="11" fill="#675e57">• 고유값 큰 방향 = 중요한 구조</text>
  <text x="655" y="176" font-size="11" fill="#675e57">• PC1, PC2만 남기면 차원 축소</text>

  <!-- caption -->
  <text x="450" y="263" text-anchor="middle" font-size="12" fill="#675e57">데이터 행렬에 SVD를 적용해도 동일한 주성분 방향을 얻을 수 있음</text>
</svg>
