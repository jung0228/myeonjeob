<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 290" font-family="system-ui,sans-serif">
  <defs>
    <marker id="rn-o" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#c65d2e"/>
    </marker>
    <marker id="rn-t" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#39675e"/>
    </marker>
  </defs>
  <rect width="900" height="290" rx="18" fill="#fffaf2" stroke="rgba(71,45,31,0.12)" stroke-width="1.5"/>

  <!-- LEFT PANEL: 입력 공간 R² — N(A)와 row space -->
  <rect x="22" y="22" width="406" height="246" rx="12" fill="#f7f1e8" stroke="rgba(71,45,31,0.1)" stroke-width="1"/>
  <text x="225" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#1f1a17">입력 공간 ℝⁿ</text>

  <!-- axes -->
  <line x1="225" y1="62" x2="225" y2="245" stroke="rgba(71,45,31,0.2)" stroke-width="1"/>
  <line x1="40" y1="155" x2="410" y2="155" stroke="rgba(71,45,31,0.2)" stroke-width="1"/>

  <!-- Null space: dashed line through origin, direction (1,0.5) normalized -->
  <!-- dir (2,1)/√5 ≈ (0.894,0.447). ±120px from (225,155) -->
  <line x1="118" y1="209" x2="332" y2="101" stroke="#39675e" stroke-width="1.8" stroke-dasharray="8,5"/>
  <text x="108" y="218" font-size="11" fill="#39675e" font-weight="600">N(A)</text>
  <text x="108" y="230" font-size="9.5" fill="#675e57">영공간</text>

  <!-- Row space: perpendicular direction (1,-2)/√5 ≈ (0.447,-0.894) -->
  <!-- ±90px from (225,155): endpoint (265,75) and (185,235) -->
  <line x1="185" y1="235" x2="265" y2="75" stroke="#c65d2e" stroke-width="1.8" stroke-dasharray="4,3"/>
  <text x="270" y="72" font-size="11" fill="#c65d2e" font-weight="600">Row(A)</text>
  <text x="270" y="84" font-size="9.5" fill="#675e57">행공간</text>

  <!-- vector x = (1,0.5) direction, len=70 -->
  <line x1="225" y1="155" x2="287" y2="124" stroke="#c65d2e" stroke-width="2.5" marker-end="url(#rn-o)"/>
  <text x="293" y="122" font-size="13" font-weight="700" fill="#c65d2e">x</text>

  <!-- null component: projection onto N(A) from x -->
  <line x1="225" y1="155" x2="256" y2="140" stroke="#39675e" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="242" y="140" font-size="9.5" fill="#39675e">x_null</text>

  <!-- origin dot -->
  <circle cx="225" cy="155" r="4" fill="#1f1a17"/>
  <text x="231" y="150" font-size="10" fill="#675e57">O</text>

  <text x="225" y="263" text-anchor="middle" font-size="11.5" fill="#675e57">N(A) ⊥ Row(A) — 직교 여공간</text>

  <!-- RIGHT PANEL: 출력 공간 R^m — Col(A) -->
  <rect x="472" y="22" width="406" height="246" rx="12" fill="#f7f1e8" stroke="rgba(71,45,31,0.1)" stroke-width="1"/>
  <text x="675" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#1f1a17">출력 공간 ℝᵐ</text>

  <!-- axes -->
  <line x1="675" y1="62" x2="675" y2="245" stroke="rgba(71,45,31,0.2)" stroke-width="1"/>
  <line x1="490" y1="155" x2="860" y2="155" stroke="rgba(71,45,31,0.2)" stroke-width="1"/>

  <!-- Col(A): line through origin dir (0.7,−0.714), ±120px -->
  <line x1="591" y1="241" x2="759" y2="69" stroke="#c65d2e" stroke-width="1.8" stroke-dasharray="8,5"/>
  <text x="762" y="67" font-size="11" fill="#c65d2e" font-weight="600">Col(A)</text>
  <text x="762" y="79" font-size="9.5" fill="#675e57">열공간</text>

  <!-- Ax vector (image) on Col(A), len=85 dir (0.7,−0.714) → (735,95) -->
  <line x1="675" y1="155" x2="735" y2="97" stroke="#c65d2e" stroke-width="2.5" marker-end="url(#rn-o)"/>
  <text x="740" y="94" font-size="13" font-weight="700" fill="#c65d2e">Ax</text>

  <!-- Left null space N(Aᵀ): perpendicular dir (0.714,0.7) -->
  <!-- ±90px: (739,218) to (611,92) -->
  <line x1="611" y1="218" x2="739" y2="92" stroke="#39675e" stroke-width="1.8" stroke-dasharray="4,3"/>
  <text x="596" y="220" font-size="11" fill="#39675e" font-weight="600">N(Aᵀ)</text>
  <text x="584" y="232" font-size="9.5" fill="#675e57">좌영공간</text>

  <!-- origin dot -->
  <circle cx="675" cy="155" r="4" fill="#1f1a17"/>

  <!-- rank-nullity box -->
  <rect x="490" y="192" width="160" height="50" rx="8" fill="rgba(198,93,46,0.08)" stroke="rgba(198,93,46,0.3)" stroke-width="1"/>
  <text x="570" y="212" text-anchor="middle" font-size="11" font-weight="700" fill="#c65d2e">rank-nullity 정리</text>
  <text x="570" y="228" text-anchor="middle" font-size="10.5" fill="#1f1a17">rank(A) + nullity(A) = n</text>

  <text x="675" y="263" text-anchor="middle" font-size="11.5" fill="#675e57">Col(A) ⊥ N(Aᵀ) — 4개의 기본 부분공간</text>
</svg>
