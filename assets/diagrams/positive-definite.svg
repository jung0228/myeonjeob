<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 290" font-family="system-ui,sans-serif">
  <defs>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#c65d2e"/>
    </marker>
    <marker id="at" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#39675e"/>
    </marker>
  </defs>
  <rect width="900" height="290" rx="18" fill="#fffaf2" stroke="rgba(71,45,31,0.12)" stroke-width="1.5"/>

  <!-- LEFT PANEL: Level curves (xᵀAx = c) -->
  <rect x="22" y="22" width="490" height="246" rx="12" fill="#f7f1e8" stroke="rgba(71,45,31,0.1)" stroke-width="1"/>
  <text x="267" y="47" text-anchor="middle" font-size="13" font-weight="700" fill="#1f1a17">양의 정부호 행렬의 수준 곡선 (xᵀAx = c)</text>

  <!-- Axis lines -->
  <line x1="60" y1="158" x2="474" y2="158" stroke="rgba(71,45,31,0.2)" stroke-width="1"/>
  <line x1="267" y1="40" x2="267" y2="258" stroke="rgba(71,45,31,0.2)" stroke-width="1"/>

  <!-- Concentric ellipses (rotated 30°) — λ₁=3 (x-axis,smaller), λ₂=1 (y-axis,larger) -->
  <!-- Rotating the ellipses by 30° means the principal axes are at 30° -->
  <!-- Level 1: rx=20, ry=35 -->
  <ellipse cx="267" cy="158" rx="20" ry="35" fill="rgba(198,93,46,0.2)" stroke="#c65d2e" stroke-width="1.5"
    transform="rotate(30,267,158)"/>
  <!-- Level 2: rx=28, ry=50 -->
  <ellipse cx="267" cy="158" rx="28" ry="50" fill="rgba(198,93,46,0.1)" stroke="#c65d2e" stroke-width="1.2" stroke-opacity="0.7"
    transform="rotate(30,267,158)"/>
  <!-- Level 3: rx=37, ry=65 -->
  <ellipse cx="267" cy="158" rx="37" ry="65" fill="rgba(198,93,46,0.05)" stroke="#c65d2e" stroke-width="1" stroke-opacity="0.5"
    transform="rotate(30,267,158)"/>

  <!-- Level labels (along x-axis offset) -->
  <text x="390" y="154" font-size="11" fill="#c65d2e" opacity="0.7">c = 3</text>
  <text x="365" y="154" font-size="11" fill="#c65d2e" opacity="0.85">c = 2</text>
  <text x="337" y="154" font-size="11" fill="#c65d2e">c = 1</text>

  <!-- Eigenvector v₁: direction (cos30,sin30)=(0.866,0.5), length=65 in screen -->
  <line x1="267" y1="158" x2="323" y2="191" stroke="#c65d2e" stroke-width="2.5" marker-end="url(#ao)"/>
  <text x="328" y="187" font-size="12" font-weight="700" fill="#c65d2e">v₁</text>
  <text x="310" y="206" font-size="10" fill="#c65d2e">λ₁ = 3 (큰 곡률)</text>

  <!-- Eigenvector v₂: direction (-sin30,cos30)=(-0.5,0.866)*65 → (-32,56) → (235,102) -->
  <line x1="267" y1="158" x2="235" y2="102" stroke="#39675e" stroke-width="2.5" marker-end="url(#at)"/>
  <text x="218" y="98" font-size="12" font-weight="700" fill="#39675e">v₂</text>
  <text x="173" y="116" font-size="10" fill="#39675e">λ₂ = 1 (작은 곡률)</text>

  <!-- Center dot -->
  <circle cx="267" cy="158" r="4" fill="#1f1a17" opacity="0.6"/>
  <text x="273" y="174" font-size="10" fill="#675e57">최솟값</text>

  <text x="267" y="265" text-anchor="middle" font-size="11" fill="#675e57">고유값이 클수록 그 방향의 곡률이 크다 (타원의 축이 짧아짐)</text>

  <!-- RIGHT PANEL: conditions summary -->
  <rect x="528" y="22" width="350" height="246" rx="12" fill="#fffaf2" stroke="rgba(71,45,31,0.12)" stroke-width="1.2"/>
  <text x="703" y="50" text-anchor="middle" font-size="13" font-weight="700" fill="#1f1a17">양의 정부호 판별 조건</text>

  <!-- PD conditions -->
  <rect x="548" y="62" width="310" height="38" rx="8" fill="rgba(198,93,46,0.1)" stroke="rgba(198,93,46,0.3)" stroke-width="1"/>
  <text x="703" y="78" text-anchor="middle" font-size="12" fill="#1f1a17" font-weight="600">모든 고유값 λᵢ &gt; 0</text>
  <text x="703" y="93" text-anchor="middle" font-size="11" fill="#675e57">← PD의 필요충분 조건</text>

  <rect x="548" y="110" width="310" height="38" rx="8" fill="rgba(57,103,94,0.1)" stroke="rgba(57,103,94,0.25)" stroke-width="1"/>
  <text x="703" y="126" text-anchor="middle" font-size="12" fill="#1f1a17" font-weight="600">모든 순주행렬식(leading minor) &gt; 0</text>
  <text x="703" y="141" text-anchor="middle" font-size="11" fill="#675e57">← Sylvester 조건</text>

  <rect x="548" y="158" width="310" height="38" rx="8" fill="rgba(71,45,31,0.06)" stroke="rgba(71,45,31,0.15)" stroke-width="1"/>
  <text x="703" y="174" text-anchor="middle" font-size="12" fill="#1f1a17" font-weight="600">실전: 공분산 행렬 ≥ 0 (PSD)</text>
  <text x="703" y="189" text-anchor="middle" font-size="11" fill="#675e57">고유값 ≥ 0, xᵀΣx ≥ 0</text>

  <rect x="548" y="206" width="310" height="38" rx="8" fill="rgba(71,45,31,0.06)" stroke="rgba(71,45,31,0.15)" stroke-width="1"/>
  <text x="703" y="222" text-anchor="middle" font-size="12" fill="#1f1a17" font-weight="600">실전: 헤시안이 PD → 극소점</text>
  <text x="703" y="237" text-anchor="middle" font-size="11" fill="#675e57">최적화에서 convex 조건</text>
</svg>
