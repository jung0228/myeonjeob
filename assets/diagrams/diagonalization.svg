<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="420" rx="32" fill="#FFF8F0"/>
  <rect x="24" y="24" width="1152" height="372" rx="24" fill="#FFFDF9" stroke="#E8D9C8" stroke-width="2"/>
  <text x="58" y="82" fill="#8E3513" font-size="28" font-weight="800" font-family="SUIT, sans-serif">대각화의 핵심 흐름</text>
  <g transform="translate(58 128)">
    <rect width="280" height="208" rx="24" fill="#FAF1E6" stroke="#E6D4C1" stroke-width="2"/>
    <text x="28" y="48" fill="#1F1A17" font-size="24" font-weight="800" font-family="SUIT, sans-serif">원래 좌표계</text>
    <text x="28" y="84" fill="#675E57" font-size="18" font-family="SUIT, sans-serif">축이 섞여 있어 변환이 복잡하게 보임</text>
    <g stroke-width="6" stroke-linecap="round">
      <line x1="60" y1="150" x2="138" y2="90" stroke="#2F5D56"/>
      <line x1="60" y1="150" x2="188" y2="118" stroke="#C65D2E"/>
      <line x1="60" y1="150" x2="162" y2="196" stroke="#8E3513"/>
    </g>
  </g>
  <text x="374" y="238" fill="#8E3513" font-size="58" font-weight="800" font-family="SUIT, sans-serif">→</text>
  <g transform="translate(462 128)">
    <rect width="280" height="208" rx="24" fill="#F7E8DF" stroke="#DDAF98" stroke-width="2"/>
    <text x="28" y="48" fill="#1F1A17" font-size="24" font-weight="800" font-family="SUIT, sans-serif">고유벡터 기준</text>
    <text x="28" y="84" fill="#675E57" font-size="18" font-family="SUIT, sans-serif">좌표계를 바꾸면 축이 정렬됨</text>
    <g stroke-width="7" stroke-linecap="round">
      <line x1="54" y1="154" x2="216" y2="154" stroke="#C65D2E"/>
      <line x1="54" y1="196" x2="194" y2="196" stroke="#2F5D56"/>
    </g>
  </g>
  <text x="778" y="238" fill="#8E3513" font-size="58" font-weight="800" font-family="SUIT, sans-serif">→</text>
  <g transform="translate(866 128)">
    <rect width="280" height="208" rx="24" fill="#FAF1E6" stroke="#E6D4C1" stroke-width="2"/>
    <text x="28" y="48" fill="#1F1A17" font-size="24" font-weight="800" font-family="SUIT, sans-serif">대각행렬 해석</text>
    <text x="28" y="84" fill="#675E57" font-size="18" font-family="SUIT, sans-serif">각 축이 독립적으로 스케일만 변함</text>
    <rect x="76" y="112" width="124" height="78" rx="16" fill="#FFFDF9" stroke="#DDB9A3" stroke-width="2"/>
    <text x="102" y="140" fill="#8E3513" font-size="18" font-weight="700" font-family="SUIT, sans-serif">λ₁</text>
    <text x="162" y="180" fill="#8E3513" font-size="18" font-weight="700" font-family="SUIT, sans-serif">λ₂</text>
    <text x="28" y="206" fill="#675E57" font-size="16" font-family="SUIT, sans-serif">복잡한 행렬이 축별 배율 해석으로 단순화됨</text>
  </g>
</svg>
