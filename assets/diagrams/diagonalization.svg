<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="system-ui,sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#c65d2e"/>
    </marker>
  </defs>
  <rect width="900" height="280" rx="18" fill="#fffaf2" stroke="rgba(71,45,31,0.12)" stroke-width="1.5"/>

  <!-- BOX 1: A -->
  <rect x="30" y="36" width="222" height="208" rx="14" fill="#fffaf2" stroke="rgba(71,45,31,0.15)" stroke-width="1.2"/>
  <text x="141" y="62" text-anchor="middle" font-size="22" font-weight="700" fill="#1f1a17">A</text>
  <text x="141" y="80" text-anchor="middle" font-size="11" fill="#675e57">원래 행렬</text>
  <!-- 2x2 matrix grid: all cells filled -->
  <!-- cells centered at (141,148): 2×(42×34)+4gap = 88×72, start at (97,112) -->
  <rect x="97" y="112" width="42" height="34" rx="4" fill="rgba(198,93,46,0.12)" stroke="rgba(198,93,46,0.3)" stroke-width="1"/>
  <text x="118" y="134" text-anchor="middle" font-size="13" fill="#1f1a17" font-style="italic">a</text>
  <rect x="143" y="112" width="42" height="34" rx="4" fill="rgba(198,93,46,0.12)" stroke="rgba(198,93,46,0.3)" stroke-width="1"/>
  <text x="164" y="134" text-anchor="middle" font-size="13" fill="#1f1a17" font-style="italic">b</text>
  <rect x="97" y="150" width="42" height="34" rx="4" fill="rgba(198,93,46,0.12)" stroke="rgba(198,93,46,0.3)" stroke-width="1"/>
  <text x="118" y="172" text-anchor="middle" font-size="13" fill="#1f1a17" font-style="italic">c</text>
  <rect x="143" y="150" width="42" height="34" rx="4" fill="rgba(198,93,46,0.12)" stroke="rgba(198,93,46,0.3)" stroke-width="1"/>
  <text x="164" y="172" text-anchor="middle" font-size="13" fill="#1f1a17" font-style="italic">d</text>
  <text x="141" y="220" text-anchor="middle" font-size="11" fill="#675e57">각 원소가 서로 얽혀 있음</text>

  <!-- ARROW 1 -->
  <line x1="262" y1="140" x2="310" y2="140" stroke="#c65d2e" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="286" y="132" text-anchor="middle" font-size="10" fill="#675e57">고유벡터</text>
  <text x="286" y="154" text-anchor="middle" font-size="10" fill="#675e57">기저로</text>

  <!-- BOX 2: Λ (diagonal) -->
  <rect x="320" y="36" width="260" height="208" rx="14" fill="#fffaf2" stroke="rgba(71,45,31,0.15)" stroke-width="1.2"/>
  <text x="450" y="62" text-anchor="middle" font-size="22" font-weight="700" fill="#c65d2e">Λ = P⁻¹AP</text>
  <text x="450" y="80" text-anchor="middle" font-size="11" fill="#675e57">대각행렬 — 각 축 독립</text>
  <!-- 2x2 matrix: diagonal orange, off-diagonal grayed -->
  <!-- centered at (450,148): start at (406,112) -->
  <rect x="406" y="112" width="42" height="34" rx="4" fill="rgba(198,93,46,0.22)" stroke="rgba(198,93,46,0.5)" stroke-width="1.5"/>
  <text x="427" y="134" text-anchor="middle" font-size="13" fill="#c65d2e" font-style="italic">λ₁</text>
  <rect x="452" y="112" width="42" height="34" rx="4" fill="rgba(71,45,31,0.04)" stroke="rgba(71,45,31,0.1)" stroke-width="1"/>
  <text x="473" y="134" text-anchor="middle" font-size="13" fill="rgba(71,45,31,0.3)">0</text>
  <rect x="406" y="150" width="42" height="34" rx="4" fill="rgba(71,45,31,0.04)" stroke="rgba(71,45,31,0.1)" stroke-width="1"/>
  <text x="427" y="172" text-anchor="middle" font-size="13" fill="rgba(71,45,31,0.3)">0</text>
  <rect x="452" y="150" width="42" height="34" rx="4" fill="rgba(198,93,46,0.22)" stroke="rgba(198,93,46,0.5)" stroke-width="1.5"/>
  <text x="473" y="172" text-anchor="middle" font-size="13" fill="#c65d2e" font-style="italic">λ₂</text>
  <text x="450" y="220" text-anchor="middle" font-size="11" fill="#675e57">대각 원소만 0이 아님 → 축 간 간섭 없음</text>

  <!-- ARROW 2 -->
  <line x1="590" y1="140" x2="638" y2="140" stroke="#c65d2e" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="614" y="132" text-anchor="middle" font-size="10" fill="#675e57">거듭제곱</text>
  <text x="614" y="154" text-anchor="middle" font-size="10" fill="#675e57">단순화</text>

  <!-- BOX 3: Aⁿ -->
  <rect x="648" y="36" width="222" height="208" rx="14" fill="#fffaf2" stroke="rgba(57,103,94,0.25)" stroke-width="1.2"/>
  <text x="759" y="62" text-anchor="middle" font-size="19" font-weight="700" fill="#39675e">Aⁿ = PΛⁿP⁻¹</text>
  <text x="759" y="80" text-anchor="middle" font-size="11" fill="#675e57">빠른 거듭제곱</text>
  <!-- 2x2: only diagonal, λ^n -->
  <rect x="715" y="112" width="44" height="34" rx="4" fill="rgba(57,103,94,0.15)" stroke="rgba(57,103,94,0.4)" stroke-width="1.5"/>
  <text x="737" y="129" text-anchor="middle" font-size="12" fill="#39675e" font-style="italic">λ₁ⁿ</text>
  <rect x="763" y="112" width="44" height="34" rx="4" fill="rgba(71,45,31,0.04)" stroke="rgba(71,45,31,0.1)" stroke-width="1"/>
  <text x="785" y="134" text-anchor="middle" font-size="13" fill="rgba(71,45,31,0.3)">0</text>
  <rect x="715" y="150" width="44" height="34" rx="4" fill="rgba(71,45,31,0.04)" stroke="rgba(71,45,31,0.1)" stroke-width="1"/>
  <text x="737" y="172" text-anchor="middle" font-size="13" fill="rgba(71,45,31,0.3)">0</text>
  <rect x="763" y="150" width="44" height="34" rx="4" fill="rgba(57,103,94,0.15)" stroke="rgba(57,103,94,0.4)" stroke-width="1.5"/>
  <text x="785" y="167" text-anchor="middle" font-size="12" fill="#39675e" font-style="italic">λ₂ⁿ</text>
  <text x="759" y="220" text-anchor="middle" font-size="11" fill="#675e57">대각 원소만 n제곱하면 끝</text>
</svg>
