<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 290" font-family="system-ui,sans-serif">
  <defs>
    <marker id="ls-o" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#c65d2e"/>
    </marker>
    <marker id="ls-t" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#39675e"/>
    </marker>
    <marker id="ls-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="rgba(71,45,31,0.5)"/>
    </marker>
  </defs>
  <rect width="900" height="290" rx="18" fill="#fffaf2" stroke="rgba(71,45,31,0.12)" stroke-width="1.5"/>

  <!-- LEFT PANEL: 기하 해석 -->
  <rect x="22" y="22" width="430" height="246" rx="12" fill="#f7f1e8" stroke="rgba(71,45,31,0.1)" stroke-width="1"/>
  <text x="237" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#1f1a17">기하적 해석</text>

  <!-- Col(A) plane: parallelogram representing the column space -->
  <polygon points="100,230 230,120 380,140 250,250" fill="rgba(198,93,46,0.08)" stroke="rgba(198,93,46,0.3)" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="173" y="196" font-size="11" fill="#c65d2e" font-weight="600" transform="rotate(-15,173,196)">Col(A)</text>

  <!-- origin -->
  <circle cx="140" cy="218" r="3.5" fill="#1f1a17"/>
  <text x="130" y="234" font-size="10" fill="#675e57">O</text>

  <!-- b vector: goes up and to the right, outside the plane -->
  <line x1="140" y1="218" x2="305" y2="80" stroke="rgba(71,45,31,0.5)" stroke-width="2.5" marker-end="url(#ls-g)"/>
  <text x="310" y="76" font-size="13" font-weight="700" fill="#675e57">b</text>

  <!-- Ax-hat: projection of b onto Col(A) -->
  <line x1="140" y1="218" x2="282" y2="158" stroke="#c65d2e" stroke-width="2.5" marker-end="url(#ls-o)"/>
  <text x="262" y="152" font-size="12" font-weight="700" fill="#c65d2e">Ax̂</text>

  <!-- residual: b - Ax-hat (perpendicular) -->
  <line x1="282" y1="158" x2="305" y2="80" stroke="#39675e" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ls-t)"/>
  <text x="308" y="122" font-size="11" font-weight="600" fill="#39675e">r = b−Ax̂</text>

  <!-- right angle mark -->
  <rect x="280" y="147" width="10" height="10" fill="none" stroke="#39675e" stroke-width="1.2" transform="rotate(30,285,152)"/>

  <text x="237" y="263" text-anchor="middle" font-size="11" fill="#675e57">잔차 r = b−Ax̂ ⊥ Col(A)</text>

  <!-- RIGHT PANEL: 공식 박스들 -->
  <rect x="468" y="22" width="410" height="246" rx="12" fill="#f7f1e8" stroke="rgba(71,45,31,0.1)" stroke-width="1"/>
  <text x="673" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#1f1a17">핵심 공식</text>

  <!-- Normal equation box -->
  <rect x="488" y="56" width="370" height="52" rx="8" fill="rgba(198,93,46,0.1)" stroke="rgba(198,93,46,0.4)" stroke-width="1.5"/>
  <text x="673" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#c65d2e">정규 방정식 (Normal Equation)</text>
  <text x="673" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#1f1a17">AᵀAx̂ = Aᵀb</text>

  <!-- pseudoinverse box -->
  <rect x="488" y="120" width="370" height="52" rx="8" fill="rgba(57,103,94,0.08)" stroke="rgba(57,103,94,0.35)" stroke-width="1.5"/>
  <text x="673" y="139" text-anchor="middle" font-size="11" font-weight="700" fill="#39675e">의사역행렬 (Pseudoinverse)</text>
  <text x="673" y="160" text-anchor="middle" font-size="13" font-weight="600" fill="#1f1a17">A⁺ = VΣ⁺Uᵀ</text>

  <!-- solution box -->
  <rect x="488" y="184" width="370" height="52" rx="8" fill="rgba(71,45,31,0.05)" stroke="rgba(71,45,31,0.2)" stroke-width="1.2"/>
  <text x="673" y="203" text-anchor="middle" font-size="11" font-weight="700" fill="#675e57">최소놈 해 (Minimum-norm solution)</text>
  <text x="673" y="224" text-anchor="middle" font-size="13" font-weight="600" fill="#1f1a17">x̂ = A⁺b = VΣ⁺Uᵀb</text>

  <text x="673" y="263" text-anchor="middle" font-size="11" fill="#675e57" font-style="italic">AᵀA 가역이면 A⁺ = (AᵀA)⁻¹Aᵀ</text>
</svg>
